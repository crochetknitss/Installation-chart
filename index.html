<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installation Scheme</title>

    <style>
        <h1> hello world </h1>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        header {
            background-color: #0b3d91;
            color: white;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .box {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>

<header>
    Special Installation Scheme for RAC Units
</header>

<div class="box">
    <img src="image.png" alt="Installation Chart">
</div>

</body>
</html>
